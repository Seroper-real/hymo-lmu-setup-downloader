name: Build and Release Windows Exe

on:
  push:
    tags:
      - 'v*' # Si attiva quando fai il push di un tag (es. v1.0.1)
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.3'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Compila con PyInstaller
        run: |
          pyinstaller --onefile --name "hymo-lmu-setup-downloader" --paths=src src\main.py

      - name: Prepara il pacchetto Release
        shell: cmd
        run: |
          if not exist release_pkg mkdir release_pkg
          if not exist release_pkg\config mkdir release_pkg\config
          copy dist\hymo-lmu-setup-downloader.exe release_pkg\
          copy config\config.json release_pkg\config\
          copy config\tracks.json release_pkg\config\
          copy .env.sample release_pkg\.env
          powershell -Command "Compress-Archive -Path 'release_pkg\*' -DestinationPath 'hymo-lmu-setup-downloader_Windows.zip' -Force"

      - name: Crea Release e carica Asset
        uses: softprops/action-gh-release@v2
        with:
          files: hymo-lmu-setup-downloader_Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}